{% extends "base.html" %}
{% block title %}Change password — {{ site.site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width: 460px;">
    <p class="eyebrow"><a href="{{ url_for('main.settings') }}">&larr; Settings</a></p>
    <h1>Change password</h1>
    <hr class="horizon-rule horizon-rule--heading">
    <form method="post" action="{{ url_for('main.change_password') }}" style="margin-top: 24px;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="current_password">Current password</label>
        <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
      </div>
      <div class="field">
        <label for="new_password">New password</label>
        <div class="password-wrap">
          <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
          <button type="button" class="password-toggle" data-toggles="new_password"
                  aria-label="Show password" aria-pressed="false">Show</button>
        </div>
        <p class="field-help">At least 8 characters.</p>
      </div>
      <button class="btn btn--primary" type="submit">Update password</button>
    </form>
  </div>
</section>
{% endblock %}
