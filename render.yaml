services:
  - type: web
    name: first-light
    runtime: python
    plan: starter
    # DB migrations/seed must run at RUNTIME (start), not at build: Render's
    # internal database hostname only resolves once the service is running.
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && python seed.py && gunicorn "app:create_app()" --workers 2 --threads 4 --timeout 60
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: FLASK_APP
        value: "app:create_app"
      - key: DATABASE_URL
        fromDatabase:
          name: first-light-db
          property: connectionString
      # Email (required): Brevo HTTP API + the verified sender address.
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # Lemon Squeezy (optional: set when you wire up payments).
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_API_KEY
        sync: false

databases:
  - name: first-light-db
    plan: basic-256mb
